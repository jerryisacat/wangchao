name: 功能请求
description: 建议一个新功能或改进
title: "feat: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出功能建议。请尽量描述清楚这个功能解决什么问题、为什么对你有用。

  - type: textarea
    id: problem
    attributes:
      label: 解决的问题
      description: 这个功能想解决什么问题？或者你遇到了什么痛点？
      placeholder: |
        目前 xxx 场景下，我需要手动做 yyy，很不方便。
        或者：如果望潮能支持 zzz，我就可以……
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你期望的功能是什么样的？不需要特别细节，但尽量说清楚交互和预期结果。
      placeholder: |
        期望在 xxx 页面/场景下，可以 yyy，效果是 zzz。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些替代方案或 workaround？
      placeholder: 目前我的 workaround 是 ...
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 任何有助于理解这个需求的背景、截图、参考项目等。
    validations:
      required: false
