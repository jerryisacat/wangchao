name: Bug 报告
description: 报告一个 bug（Worker、Web、数据库、管线、部署等）
title: "bug: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间提交 bug 报告。请尽量提供以下信息，帮助我们更快定位和修复。

        提交前请确认：
        - 你使用的是最新的 `main` 分支
        - 这个问题之前没有人提过（搜索已有 Issues）

  - type: input
    id: version
    attributes:
      label: 版本 / 分支
      description: 你使用的是哪个 commit 或分支？
      placeholder: "main 分支，commit a1b2c3d"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 问题区域
      description: bug 发生在哪个模块？
      options:
        - Web 界面（Dashboard、表单、导出等）
        - Worker（抓取、分析、简报生成）
        - 数据库（migration、seed、查询）
        - API / Server Action
        - 部署运维（Railway、Docker、环境变量）
        - 文档
        - 其他
    validations:
      required: true

  - type: textarea
    id: current_behavior
    attributes:
      label: 当前行为
      description: 实际发生了什么？如果有错误日志或截图，请附上。
      placeholder: |
        1. 执行了 xxx 操作
        2. 期望看到 yyy
        3. 实际看到了 zzz

        错误日志：
        ```
        Error: ...
        ```
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: 期望行为
      description: 你期望发生什么？
      placeholder: 期望 ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 请列出复现这个 bug 的具体步骤。
      placeholder: |
        1. 创建主题 'xxx'
        2. 添加 RSS 源 'yyy'
        3. 运行 `pnpm dev`
        4. 访问 http://localhost:3000
        5. ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 运行环境
      description: 你的本地或部署环境信息。
      placeholder: |
        - OS: macOS 15 / Ubuntu 24.04
        - Node.js: 22.x
        - pnpm: 9.x
        - Postgres: 16.x
        - 部署平台: Railway / Docker / 本地
    validations:
      required: false
